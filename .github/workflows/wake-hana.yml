name: Wake up HANA Cloud

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  wake-hana:
    runs-on: ubuntu-latest
    steps:
      - name: Get OAuth Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            "${{ secrets.UAA_URL }}/oauth/token" \
            -u "${{ secrets.SM_CLIENT_ID }}:${{ secrets.SM_CLIENT_SECRET }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Start HANA Cloud
        run: |
          RESPONSE=$(curl -s -X PATCH \
            "${{ secrets.SM_URL }}/v1/service_instances/${{ secrets.HANA_INSTANCE_ID }}" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"parameters": {"data": {"serviceStopped": false}}}')
          echo "Full response: $RESPONSE"
